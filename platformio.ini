; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 921600
upload_speed = 921600
lib_deps =

; Host (native) build of the pure C++ signal-processing test.
; The C++ test lives outside test/ (so `pio test` doesn't try to run it as a
; Unity test). Build+run with `pio run -e native` then execute
; `.pio\build\native\program.exe`. The test pulls in breath_detector.cpp
; directly via a relative #include, so no Arduino dependency is needed.
[env:native]
platform = native
src_dir = cpp_test
src_filter = +<*.cpp>
